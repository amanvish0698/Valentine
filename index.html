<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bird Game Engine</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    text-align: center;
}

#top-bar {
    padding: 10px;
    background: #222;
}

button, select {
    margin: 5px;
    padding: 8px;
}

canvas {
    display: block;
    margin: auto;
    background: #000;
    touch-action: manipulation;
}

#preview {
    max-width: 100px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div id="top-bar">
    <input type="file" id="upload">
    <button onclick="saveCharacter()">Save Character</button>

    <select id="characterSelect" onchange="loadCharacter()"></select>

    <select id="theme" onchange="setTheme()">
        <option value="fire">🔥 Fire</option>
        <option value="water">💧 Water</option>
    </select>
</div>

<canvas id="gameCanvas"></canvas>
<img id="preview"/>

<script>
/* =========================
   CANVAS SETUP (RESPONSIVE)
========================= */
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 80;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

/* =========================
   IMAGE UPLOAD + CROP
========================= */
let uploadedImage = null;

document.getElementById("upload").addEventListener("change", function(e) {
    const file = e.target.files[0];
    const img = new Image();
    img.onload = () => {
        uploadedImage = cropImage(img);
        document.getElementById("preview").src = uploadedImage;
    };
    img.src = URL.createObjectURL(file);
});

function cropImage(img) {
    const size = Math.min(img.width, img.height);
    const tempCanvas = document.createElement("canvas");
    const tctx = tempCanvas.getContext("2d");

    tempCanvas.width = 100;
    tempCanvas.height = 100;

    tctx.drawImage(
        img,
        (img.width - size) / 2,
        (img.height - size) / 2,
        size,
        size,
        0,
        0,
        100,
        100
    );

    return tempCanvas.toDataURL();
}

/* =========================
   CHARACTER LIBRARY (LOCAL STORAGE)
========================= */
function saveCharacter() {
    if (!uploadedImage) return alert("Upload image first");

    let characters = JSON.parse(localStorage.getItem("birds") || "[]");
    characters.push(uploadedImage);
    localStorage.setItem("birds", JSON.stringify(characters));

    loadCharacterList();
}

function loadCharacterList() {
    const select = document.getElementById("characterSelect");
    select.innerHTML = "";

    let characters = JSON.parse(localStorage.getItem("birds") || "[]");

    characters.forEach((c, i) => {
        let opt = document.createElement("option");
        opt.value = i;
        opt.text = "Bird " + (i + 1);
        select.appendChild(opt);
    });
}

function loadCharacter() {
    let characters = JSON.parse(localStorage.getItem("birds") || "[]");
    currentBird.src = characters[document.getElementById("characterSelect").value];
}

loadCharacterList();

/* =========================
   GAME ENGINE
========================= */
let bird = { x: 100, y: 200, velocity: 0 };
let gravity = 0.5;
let lift = -8;

let currentBird = new Image();
currentBird.src = "";

canvas.addEventListener("click", flap);
canvas.addEventListener("touchstart", flap);

function flap() {
    bird.velocity = lift;
    playSound("flap");
}

/* =========================
   OBSTACLES
========================= */
let pipes = [];

function createPipe() {
    let gap = 150;
    let top = Math.random() * (canvas.height - gap);

    pipes.push({
        x: canvas.width,
        top: top,
        bottom: canvas.height - (top + gap)
    });
}

setInterval(createPipe, 2000);

/* =========================
   THEMES
========================= */
let theme = "fire";

function setTheme() {
    theme = document.getElementById("theme").value;
}

/* =========================
   AUDIO ENGINE (WEB AUDIO API)
========================= */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
    const osc = audioCtx.createOscillator();
    osc.connect(audioCtx.destination);

    if (type === "flap") osc.frequency.value = 500;
    if (type === "hit") osc.frequency.value = 100;

    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
}

/* =========================
   GAME LOOP
========================= */
function update() {
    bird.velocity += gravity;
    bird.y += bird.velocity;

    if (bird.y > canvas.height) {
        bird.y = canvas.height;
        playSound("hit");
    }

    pipes.forEach(p => {
        p.x -= 3;

        // collision
        if (
            bird.x < p.x + 50 &&
            bird.x + 50 > p.x &&
            (bird.y < p.top || bird.y > canvas.height - p.bottom)
        ) {
            playSound("hit");
        }
    });
}

function draw() {
    // Theme background
    if (theme === "fire") ctx.fillStyle = "#330000";
    else ctx.fillStyle = "#001f3f";

    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Bird
    if (currentBird.src) {
        ctx.drawImage(currentBird, bird.x, bird.y, 50, 50);
    } else {
        ctx.fillStyle = "yellow";
        ctx.fillRect(bird.x, bird.y, 50, 50);
    }

    // Pipes
    pipes.forEach(p => {
        ctx.fillStyle = theme === "fire" ? "red" : "cyan";

        ctx.fillRect(p.x, 0, 50, p.top);
        ctx.fillRect(p.x, canvas.height - p.bottom, 50, p.bottom);
    });
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
